<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060B14"/>
      <stop offset="1" stop-color="#0D1B2A"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="dotglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="220" fill="url(#bg)"/>

  <!-- circuit lines background -->
  <g stroke="#123246" stroke-width="1" opacity="0.7">
    <path d="M0,40 H180 L210,70 H420" fill="none"/>
    <path d="M0,180 H140 L170,150 H360" fill="none"/>
    <path d="M1000,50 H820 L790,80 H620" fill="none"/>
    <path d="M1000,190 H860 L830,160 H660" fill="none"/>
    <circle cx="210" cy="70" r="3" fill="#00FFFF"/>
    <circle cx="420" cy="70" r="3" fill="#00FFFF"/>
    <circle cx="790" cy="80" r="3" fill="#00FFFF"/>
    <circle cx="660" cy="160" r="3" fill="#00FFFF"/>
  </g>

  <!-- left: simple robotic arm -->
  <g stroke="#5FE0E8" stroke-width="4" fill="none" opacity="0.85">
    <circle cx="70" cy="180" r="10" fill="#0D1B2A" stroke="#00FFFF"/>
    <line x1="70" y1="180" x2="95" y2="110"/>
    <circle cx="95" cy="110" r="7" fill="#0D1B2A" stroke="#00FFFF"/>
    <line x1="95" y1="110" x2="150" y2="90"/>
    <circle cx="150" cy="90" r="7" fill="#0D1B2A" stroke="#00FFFF"/>
    <line x1="150" y1="90" x2="175" y2="55"/>
    <path d="M175,55 L165,40 M175,55 L188,42" stroke="#00FFFF"/>
  </g>

  <!-- right: wireframe head -->
  <g opacity="0.9">
    <circle cx="905" cy="110" r="55" fill="none" stroke="#2C5364" stroke-width="1.5"/>
    <g fill="#00FFFF">
      <circle cx="905" cy="60" r="2" fill="#5FE0E8"/>
      <circle cx="865" cy="90" r="2" fill="#5FE0E8"/>
      <circle cx="945" cy="90" r="2" fill="#5FE0E8"/>
      <circle cx="875" cy="140" r="2" fill="#5FE0E8"/>
      <circle cx="935" cy="140" r="2" fill="#5FE0E8"/>
      <circle cx="905" cy="160" r="2" fill="#5FE0E8"/>
      <circle cx="905" cy="105" r="4" fill="#00FFFF" filter="url(#glow)"/>
    </g>
    <g stroke="#2C5364" stroke-width="1">
      <line x1="905" y1="60" x2="865" y2="90"/>
      <line x1="905" y1="60" x2="945" y2="90"/>
      <line x1="865" y1="90" x2="875" y2="140"/>
      <line x1="945" y1="90" x2="935" y2="140"/>
      <line x1="875" y1="140" x2="905" y2="160"/>
      <line x1="935" y1="140" x2="905" y2="160"/>
      <line x1="905" y1="60" x2="905" y2="105"/>
      <line x1="865" y1="90" x2="905" y2="105"/>
      <line x1="945" y1="90" x2="905" y2="105"/>
    </g>
    <circle cx="905" cy="110" r="3" fill="url(#dotglow)"/>
  </g>

  <!-- title -->
  <text x="500" y="100" text-anchor="middle" font-family="Verdana, sans-serif" font-size="46"
        font-weight="bold" fill="#00FFFF" filter="url(#glow)" letter-spacing="6">ROHON ALAM</text>
  <text x="500" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-size="15"
        fill="#B8E6EA" letter-spacing="5">ROBOTICS &#8226; AI &#8226; COMPUTER VISION</text>

  <!-- underline accent -->
  <line x1="400" y1="145" x2="600" y2="145" stroke="#00FFFF" stroke-width="1" opacity="0.6"/>

  <text x="500" y="172" text-anchor="middle" font-family="Consolas, monospace" font-size="13"
        fill="#5FE0E8">&gt; Building intelligent systems that perceive, reason and act.</text>
</svg>
