name: Update Profile Cards

on:
  schedule:
    - cron: "0 0 * * *"   # once a day
  workflow_dispatch: {}   # manual trigger button in the Actions tab
  push:
    branches:
      - main

jobs:
  cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      - name: Fetch GitHub stats card
        run: curl -sf "https://github-stats-extended.vercel.app/api?username=RohonAlam&show_icons=true&count_private=true&hide_border=true&bg_color=0D1117&title_color=00FFFF&icon_color=00FFFF&text_color=FFFFFF&ring_color=00FFFF" -o profile/stats.svg || echo "stats fetch failed, keeping old file"

      - name: Fetch streak card
        run: curl -sf "https://streak-stats.demolab.com/?user=RohonAlam&hide_border=true&background=0D1117&stroke=00FFFF&ring=00FFFF&fire=00FFFF&currStreakLabel=00FFFF&sideLabels=FFFFFF&currStreakNum=FFFFFF&sideNums=FFFFFF&dates=888888" -o profile/streak.svg || echo "streak fetch failed, keeping old file"

      - name: Fetch top languages card
        run: curl -sf "https://github-stats-extended.vercel.app/api/top-langs/?username=RohonAlam&layout=donut&hide_border=true&bg_color=0D1117&title_color=00FFFF&text_color=FFFFFF" -o profile/top-langs.svg || echo "top-langs fetch failed, keeping old file"

      - name: Generate trophies (self-contained, no external server)
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: RohonAlam
          file: profile/trophies.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch activity graph
        run: curl -sf "https://github-readme-activity-graph.vercel.app/graph?username=RohonAlam&theme=react-dark&bg_color=0D1117&color=00FFFF&line=00FFFF&point=FFFFFF&hide_border=true" -o profile/activity-graph.svg || echo "activity graph fetch failed, keeping old file"

      - name: Fetch LeetCode card
        run: curl -sf "https://leetcard.jacoblin.cool/rohon97?theme=dark&font=Baloo&ext=heatmap" -o profile/leetcode.svg || echo "leetcode fetch failed, keeping old file"

      - name: Fetch pin - LeetCode repo
        run: curl -sf "https://github-stats-extended.vercel.app/api/pin/?username=RohonAlam&repo=LeetCode&hide_border=true&bg_color=0D1117&title_color=00FFFF&icon_color=00FFFF&text_color=FFFFFF" -o profile/pin-leetcode.svg || echo "pin fetch failed, keeping old file"

      - name: Fetch pin - 3D Terrain Generator
        run: curl -sf "https://github-stats-extended.vercel.app/api/pin/?username=RohonAlam&repo=3D-Terrain-Generator&hide_border=true&bg_color=0D1117&title_color=00FFFF&icon_color=00FFFF&text_color=FFFFFF" -o profile/pin-terrain.svg || echo "pin fetch failed, keeping old file"

      - name: Fetch pin - E Commerce Project
        run: curl -sf "https://github-stats-extended.vercel.app/api/pin/?username=RohonAlam&repo=E_Commerce_Project&hide_border=true&bg_color=0D1117&title_color=00FFFF&icon_color=00FFFF&text_color=FFFFFF" -o profile/pin-ecommerce.svg || echo "pin fetch failed, keeping old file"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update profile cards" && git push)

  snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake game from a github user (RohonAlam) contributions grid
        uses: Platane/snk@v3
        with:
          github_user_name: RohonAlam
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
